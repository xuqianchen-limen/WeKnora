<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快速笔记 5.0 - 对话</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --primary: #07C160; --primary-dark: #06ad54; --bg: #f5f6f7; --white: #fff; --text: #333; --text2: #666; --text3: #999; --border: #e5e5e5; --shadow: 0 2px 12px rgba(0,0,0,0.08); --radius: 12px; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

/* ===== Header ===== */
.header {
  background: var(--white);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  z-index: 10;
  position: relative;
}
.header-icon { width: 30px; height: 30px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.header-icon svg { width: 16px; height: 16px; color: #fff; }
.header h1 { font-size: 15px; font-weight: 600; flex: 1; min-width: 0; }
.header-title-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.header-session-title { font-size: 11px; font-weight: 400; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: none; margin-top: 1px; }
.header-session-title.show { display: block; }
.header-btn { width: 32px; height: 32px; border: none; background: #f5f6f7; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text3); transition: all 0.2s; }
.header-btn:hover { background: #eee; color: var(--text); }
.header-btn svg { width: 16px; height: 16px; }

/* ===== Messages ===== */
.messages { flex: 1; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 14px; }

.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
  overflow: hidden;
  flex-shrink: 0;
}
.msg-user {
  align-self: flex-end;
  background: var(--primary);
  color: #fff;
  border-bottom-right-radius: 6px;
  box-shadow: 0 2px 10px rgba(7, 193, 96, 0.2);
}
.msg-bot {
  align-self: flex-start;
  background: var(--white);
  color: var(--text);
  border-bottom-left-radius: 6px;
  box-shadow: 0 0 6px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.08);
}
.msg-bot pre { background: #f5f5f5; padding: 10px 12px; border-radius: 8px; overflow-x: auto; font-size: 12px; margin: 8px 0; }
.msg-bot code { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }
.msg-time { font-size: 11px; color: var(--text3); text-align: center; padding: 4px 0; }

.msg-typing {
  align-self: flex-start;
  background: var(--white);
  padding: 14px 20px;
  border-radius: 16px;
  border-bottom-left-radius: 6px;
  box-shadow: 0 0 6px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.08);
  display: none;
}
.msg-typing.show { display: flex; }
.typing-dots { display: flex; gap: 5px; }
.typing-dots span { width: 6px; height: 6px; background: var(--text3); border-radius: 50%; animation: typing-bounce 1.4s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* ===== Welcome ===== */
.welcome {
  text-align: center;
  padding: 36px 20px;
  background: var(--white);
  border-radius: 18px;
  box-shadow: 0 0 8px rgba(0,0,0,0.04), 0 4px 20px rgba(0,0,0,0.08);
  margin: 8px 0;
}
.welcome-icon { width: 56px; height: 56px; background: #e8f8ee; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
.welcome-icon svg { width: 28px; height: 28px; color: var(--primary); }
.welcome h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.welcome p { font-size: 13px; color: var(--text3); line-height: 1.5; }
.quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
.quick-btn {
  padding: 7px 16px;
  border: none;
  border-radius: 50px;
  background: #f5f6f7;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.quick-btn:hover { background: rgba(7,193,96,0.08); color: var(--primary); box-shadow: 0 2px 8px rgba(7,193,96,0.12); }

/* ===== Input Area ===== */
.input-area {
  padding: 10px 14px 14px;
  flex-shrink: 0;
  background: transparent;
}

/* 整体包裹卡片 */
.sp-chat-bar-wrapper {
  background: var(--white);
  border-radius: 16px;
  box-shadow: 0 0 6px rgba(0,0,0,0.04), 0 4px 20px rgba(0,0,0,0.10);
  overflow: visible;
  position: relative;
  transition: box-shadow 0.2s;
}
.sp-chat-bar-wrapper:focus-within {
  box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 0 0 1.5px rgba(7,193,96,0.18);
}

/* 顶部工具栏：知识库 + 模式 */
.sp-chat-bar-toolbar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 8px 0;
}

.sp-chat-bar {
  display: flex;
  align-items: center;
  padding: 4px 5px 5px 8px;
  gap: 4px;
  position: relative;
}
/* 知识库选择按钮 */
.sp-chat-bar-kb {
  display: flex;
  align-items: center;
  gap: 3px;
  border: none;
  background: #f3f4f5;
  border-radius: 50px;
  padding: 6px 8px 6px 10px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.sp-chat-bar-kb:hover { background: #eaebed; color: var(--text); }
.sp-chat-bar-kb svg { width: 13px; height: 13px; flex-shrink: 0; }
.sp-chat-bar-arrow { width: 10px !important; height: 10px !important; opacity: 0.5; }

/* 模式选择按钮 */
.sp-chat-bar-mode {
  display: flex; align-items: center; gap: 3px;
  border: none; background: #f3f4f5; border-radius: 50px;
  padding: 6px 8px 6px 10px; font-size: 11px; font-weight: 500;
  color: var(--text2); cursor: pointer; white-space: nowrap;
  transition: all 0.15s; flex-shrink: 0;
}
.sp-chat-bar-mode:hover { background: #eaebed; color: var(--text); }
.sp-chat-bar-mode svg { width: 13px; height: 13px; flex-shrink: 0; }

/* 模式下拉菜单 */
.sp-mode-dropdown-menu {
  position: fixed; background: var(--white); border-radius: 14px;
  box-shadow: 0 0 6px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.14);
  padding: 6px 0; min-width: 160px; display: none; z-index: 100;
}
.sp-mode-dropdown-menu.show { display: block; }

/* 分隔竖线 */
.sp-chat-bar-divider { width: 1px; height: 16px; background: #e5e5e5; margin: 0 8px; flex-shrink: 0; }

/* 输入框 */
.sp-chat-bar-input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  color: var(--text);
  padding: 6px 4px;
  min-width: 0;
  height: 30px;
  max-height: 120px;
  resize: none;
  overflow-y: auto;
  line-height: 18px;
}
.sp-chat-bar-input::placeholder { color: #c0c0c0; }

/* 发送按钮 — 圆形 */
.sp-chat-bar-send {
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: #e8e8e8;
  color: #aaa;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.sp-chat-bar-send svg { width: 14px; height: 14px; }
.sp-chat-bar-send.active { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(7,193,96,0.25); }
.sp-chat-bar-send.active:hover { background: var(--primary-dark); }

/* 图片上传按钮 */
.sp-chat-bar-img {
  display: flex; align-items: center; justify-content: center;
  border: none; background: none; color: #999; cursor: pointer;
  width: 28px; height: 28px; padding: 0; flex-shrink: 0; border-radius: 6px; transition: all 0.15s;
}
.sp-chat-bar-img:hover { color: var(--primary); background: rgba(7,193,96,0.06); }
.sp-chat-bar-img svg { width: 16px; height: 16px; }

/* 图片预览条 */
.sp-image-previews {
  display: flex; gap: 6px; padding: 6px 12px 0; overflow-x: auto; flex-shrink: 0;
}
.sp-img-item { position: relative; flex-shrink: 0; }
.sp-img-thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; border: 1px solid #e8e8e8; }
.sp-img-remove {
  position: absolute; top: -4px; right: -4px;
  width: 16px; height: 16px; border-radius: 50%; background: rgba(0,0,0,0.5); color: #fff;
  font-size: 12px; line-height: 16px; text-align: center; cursor: pointer; border: none; padding: 0;
}
.sp-img-remove:hover { background: #e44; }

/* 用户消息中的图片 */
.msg-user-images { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.msg-user-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; }
.msg-user-img:hover { opacity: 0.85; }

/* ===== 合并下拉菜单 (fixed定位) ===== */
.sp-kb-dropdown-menu {
  position: fixed;
  background: var(--white);
  border-radius: 14px;
  box-shadow: 0 0 6px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.14);
  padding: 6px 0;
  min-width: 200px;
  display: none;
  z-index: 100;
  max-height: 70vh;
  overflow-y: auto;
}
.sp-kb-dropdown-menu.show { display: block; }

.sp-dropdown-item {
  padding: 9px 14px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}
.sp-dropdown-item:hover { background: rgba(7,193,96,0.06); color: var(--primary); }
.sp-dropdown-item.selected { color: var(--primary); font-weight: 500; }
.sp-dropdown-item .sp-radio {
  width: 16px; height: 16px;
  border: 2px solid #ccc;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.sp-dropdown-item.selected .sp-radio { border-color: var(--primary); }
.sp-dropdown-item.selected .sp-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }
.sp-dropdown-item:hover .sp-radio { border-color: var(--primary); }
.sp-dropdown-item svg { width: 14px; height: 14px; }

/* 下拉菜单分隔线和分组标题 */
.sp-dropdown-divider { height: 1px; background: #f0f0f0; margin: 4px 12px; }
.sp-dropdown-section { padding: 6px 14px 2px; font-size: 10px; font-weight: 600; color: #bbb; letter-spacing: 0.5px; text-transform: uppercase; }

/* 模式选项 */
.sp-mode-item {
  padding: 8px 14px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}
.sp-mode-item:hover { background: rgba(7,193,96,0.06); color: var(--primary); }
.sp-mode-item.selected { color: var(--primary); font-weight: 500; }
.sp-mode-item .sp-radio {
  width: 14px; height: 14px;
  border: 2px solid #ccc;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.sp-mode-item.selected .sp-radio { border-color: var(--primary); }
.sp-mode-item.selected .sp-radio::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
.sp-mode-item:hover .sp-radio { border-color: var(--primary); }
.sp-mode-item svg { width: 14px; height: 14px; }

/* 附件选项 */
.sp-attach-item {
  padding: 8px 14px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}
.sp-attach-item:hover { background: rgba(7,193,96,0.06); color: var(--primary); }
.sp-attach-item svg { width: 14px; height: 14px; }

/* ===== Clips ===== */
.clip-card {
  background: var(--white);
  border-radius: 16px;
  padding: 14px 16px;
  box-shadow: 0 0 6px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.08);
  align-self: flex-start;
  max-width: 90%;
  transition: box-shadow 0.2s;
}
.clip-card:hover { box-shadow: 0 0 8px rgba(0,0,0,0.06), 0 6px 24px rgba(0,0,0,0.12); }
.clip-card-title { font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.clip-card-title svg { flex-shrink: 0; }
.clip-card-content { font-size: 13px; color: var(--text); line-height: 1.65; max-height: 200px; overflow-y: auto; }
.clip-actions { display: flex; gap: 8px; margin-top: 10px; }
.clip-action-btn {
  padding: 5px 14px;
  border: none;
  border-radius: 50px;
  background: #f5f6f7;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.clip-action-btn:hover { background: rgba(7,193,96,0.08); color: var(--primary); }

/* === Markdown 渲染样式 === */
.md-pre { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 10px 12px; overflow-x: auto; font-size: 12px; margin: 6px 0; line-height: 1.5; }
.md-pre code { font-family: "SF Mono", "Fira Code", "Consolas", monospace; white-space: pre; }
.md-code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: "SF Mono", "Fira Code", "Consolas", monospace; }
.md-h { margin: 8px 0 4px; line-height: 1.4; }
h1.md-h { font-size: 18px; font-weight: 700; }
h2.md-h { font-size: 16px; font-weight: 700; }
h3.md-h { font-size: 14px; font-weight: 600; }
h4.md-h, h5.md-h, h6.md-h { font-size: 13px; font-weight: 600; }
.md-bq { border-left: 3px solid var(--primary); padding: 4px 12px; margin: 6px 0; background: #f8faf8; color: #666; border-radius: 0 4px 4px 0; font-size: 13px; }
.md-list { margin: 4px 0; padding-left: 20px; font-size: 13px; line-height: 1.6; }
.md-list li { margin: 2px 0; }
.md-list .md-list { margin: 2px 0 2px 0; }
.md-p { margin: 4px 0; line-height: 1.6; font-size: 13px; }
.md-p a, .md-list a, .md-bq a { color: var(--primary); text-decoration: none; }
.md-p a:hover, .md-list a:hover { text-decoration: underline; }
.md-table { border-collapse: collapse; margin: 6px 0; font-size: 12px; }
.md-table th { border: 1px solid #e5e5e5; padding: 4px 8px; background: #f7f8fa; font-weight: 600; text-align: left; white-space: nowrap; }
.md-table td { border: 1px solid #e5e5e5; padding: 4px 8px; }
.md-table tr:hover td { background: rgba(7,193,96,0.02); }
.md-table-wrap { overflow-x: auto; margin: 6px 0; }
.md-img { max-width: 100%; max-height: 200px; border-radius: 6px; margin: 6px 0; display: block; object-fit: contain; cursor: pointer; }
.md-img:hover { opacity: 0.85; }

/* 图片灯箱 */
.sp-lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999;
  display: flex; align-items: center; justify-content: center; cursor: zoom-out;
}
.sp-lightbox img {
  max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 8px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.4);
}

/* === Agent 流式显示（参考 AgentStreamDisplay.vue）=== */
.agent-stream { display: flex; flex-direction: column; gap: 0; width: 92%; align-self: flex-start; margin-bottom: 6px; }

/* 折叠的中间步骤 — 树根 */
.agent-tree-root {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer;
  border-radius: 8px; background: var(--white); border: 0.5px solid #e0e0e0;
  box-shadow: 0 2px 4px rgba(7,192,95,0.08); color: var(--text);
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1); margin-bottom: 10px; user-select: none;
}
.agent-tree-root:hover { background: rgba(7,192,95,0.04); }
.agent-tree-root-title { display: flex; align-items: center; gap: 6px; }
.agent-tree-root-title svg { width: 16px; height: 16px; color: var(--primary); flex-shrink: 0; }
.agent-tree-root-toggle { font-size: 12px; color: var(--primary); transition: transform 0.2s; }
.agent-tree-root.expanded .agent-tree-root-toggle { transform: rotate(180deg); }

/* 树子节点 */
.agent-tree-children { display: none; padding-left: 12px; margin-top: -4px; margin-bottom: 10px; position: relative; }
.agent-tree-root.expanded + .agent-tree-children { display: block; }
.agent-tree-child { position: relative; padding-left: 20px; margin-bottom: 6px; }
.agent-tree-child::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; border-left: 1px dashed #e0e0e0; }
.agent-tree-child:last-child::before { bottom: auto; height: 15px; }
.agent-tree-branch { position: absolute; left: 0; top: 15px; width: 16px; border-top: 1px dashed #e0e0e0; }

/* 通用动作卡片（思考/工具调用） */
.agent-card {
  background: var(--white); border-radius: 5px; border: 1px solid #e8e8e8;
  overflow: hidden; transition: all 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  animation: agentFadeIn 0.25s ease-out; margin-bottom: 8px; position: relative; width: 100%;
}
.agent-card:hover { border-color: var(--primary); box-shadow: 0 1px 4px rgba(7,192,95,0.08); }
.agent-card.pending { border-color: rgba(7,192,95,0.15); overflow: hidden; }
.agent-card.pending::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 0%, rgba(7,192,95,0.06) 40%, rgba(7,192,95,0.08) 55%, transparent 85%);
  transform: translateX(-100%); animation: agentShimmer 2.8s ease-in-out infinite; pointer-events: none;
}
.agent-card.error { border-left: 2px solid #e44; }
.agent-card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 10px; cursor: pointer; user-select: none; transition: background-color 0.15s;
}
.agent-card-header:hover { background: rgba(7,192,95,0.03); }
.agent-card-header.no-expand { cursor: default; }
.agent-card-header.no-expand:hover { background: transparent; }
.agent-card-title { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.agent-card-title svg { width: 14px; height: 14px; color: var(--primary); flex-shrink: 0; }
.agent-card-name { font-size: 12px; font-weight: 500; white-space: nowrap; color: var(--text); overflow: hidden; text-overflow: ellipsis; }
.agent-card-summary { color: var(--text3); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 1; margin-left: 4px; }
.agent-card-toggle { font-size: 12px; color: var(--text3); transition: transform 0.2s; padding: 0 2px; flex-shrink: 0; }
.agent-card.expanded .agent-card-toggle { transform: rotate(180deg); }
.agent-card-detail {
  display: none; padding: 6px 12px; border-top: 1px solid #f0f0f0;
  font-size: 12px; color: var(--text2); line-height: 1.6; max-height: 200px;
  overflow-y: auto; background: #fafbfc; white-space: pre-wrap; word-break: break-word;
}
.agent-card.expanded .agent-card-detail { display: block; }
.agent-card-info {
  padding: 5px 10px; border-top: 1px solid #f0f0f0;
  font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.5;
}
.agent-card-info strong { color: var(--primary); font-weight: 600; }

/* 计划任务变更 */
.agent-plan-change {
  padding: 8px 12px; background: linear-gradient(135deg, rgba(7,192,95,0.05), rgba(7,192,95,0.02));
  border-radius: 6px; border: 1px solid rgba(7,192,95,0.2);
  font-size: 12px; color: var(--text); margin-bottom: 8px; animation: agentFadeIn 0.25s ease-out;
}
.agent-plan-change strong { color: var(--primary); font-weight: 600; margin-right: 3px; }

/* 回答区域 */
.agent-answer { animation: agentFadeIn 0.25s ease-out; }
.agent-answer-content {
  font-size: 14px; color: var(--text); line-height: 1.6; background: var(--white);
  border-radius: 16px; border-bottom-left-radius: 6px; padding: 12px 16px;
  box-shadow: 0 0 6px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.08);
}
.agent-answer-toolbar {
  display: flex; gap: 6px; margin-top: 6px; padding-left: 2px;
}
.agent-answer-toolbar button {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border: 1px solid #e8e8e8; border-radius: 50%;
  background: var(--white); cursor: pointer; color: var(--text3); transition: all 0.2s;
}
.agent-answer-toolbar button:hover { border-color: var(--primary); color: var(--primary); background: rgba(7,192,95,0.04); }
.agent-answer-toolbar button svg { width: 14px; height: 14px; }

/* 知识引用面板 */
.agent-refs {
  background: var(--white); border: 1px solid #e8e8e8; border-radius: 10px;
  margin-top: 8px; overflow: hidden; font-size: 12px;
}
.agent-refs-header {
  display: flex; align-items: center; gap: 6px; padding: 8px 12px;
  cursor: pointer; color: var(--text2); font-weight: 500; user-select: none;
}
.agent-refs-header:hover { background: rgba(7,193,96,0.04); }
.agent-refs-header svg:first-child { color: var(--primary); flex-shrink: 0; }
.agent-refs-arrow { margin-left: auto; transition: transform 0.2s; color: var(--text3); }
.agent-refs.expanded .agent-refs-arrow { transform: rotate(180deg); }
.agent-refs-list {
  display: none; border-top: 1px solid #f0f0f0; padding: 6px 12px 8px;
  max-height: 200px; overflow-y: auto;
}
.agent-refs.expanded .agent-refs-list { display: block; }
.agent-ref-group { margin-bottom: 6px; }
.agent-ref-group-title { display: flex; align-items: center; gap: 4px; font-weight: 500; color: var(--text); padding: 2px 0; font-size: 12px; }
.agent-ref-group-title svg { color: var(--primary); flex-shrink: 0; }
.agent-ref-count { color: var(--text3); font-weight: 400; font-size: 11px; }
.agent-ref-chunk { color: var(--text3); padding: 2px 0 2px 18px; line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: default; font-size: 11px; }
.agent-ref-chunk:hover { color: var(--primary); background: rgba(7,193,96,0.04); border-radius: 4px; }
.agent-ref-idx { color: var(--primary); font-weight: 500; font-size: 10px; }

/* 动画 */
@keyframes agentFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes agentShimmer { 0% { transform: translateX(-90%); } 50% { transform: translateX(-5%); } 100% { transform: translateX(90%); } }
@keyframes agentSpin { to { transform: rotate(360deg); } }
.agent-spinner { width: 12px; height: 12px; border: 2px solid #e0e0e0; border-top-color: var(--primary); border-radius: 50%; animation: agentSpin 0.8s linear infinite; display: inline-block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </div>
  <div class="header-title-wrap">
    <h1>快速笔记 5.0</h1>
    <div class="header-session-title" id="sp-session-title"></div>
  </div>
  <button class="header-btn" id="btn-clear" title="清空对话">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
  </button>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <h2>你好，有什么可以帮助你？</h2>
    <p>你可以向我提问知识库中的任何问题</p>
    <div class="quick-btns">
      <button class="quick-btn" data-q="帮我总结最近的笔记">总结笔记</button>
      <button class="quick-btn" data-q="知识库中有哪些内容？">知识库概览</button>
      <button class="quick-btn" data-q="搜索相关文档">搜索文档</button>
    </div>
  </div>
  <div class="msg-typing" id="typing">
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="sp-image-previews" id="sp-image-previews" style="display:none;"></div>
  <div class="sp-chat-bar-wrapper">
    <div class="sp-chat-bar-toolbar">
      <button class="sp-chat-bar-kb" id="sp-btn-kb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span id="sp-kb-name">全部</span>
        <svg class="sp-chat-bar-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="sp-chat-bar-mode" id="sp-btn-mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span id="sp-mode-name">快速回答</span>
        <svg class="sp-chat-bar-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <div class="sp-chat-bar">
      <button class="sp-chat-bar-img" id="sp-image-btn" style="display:none;" title="上传图片">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <textarea class="sp-chat-bar-input" id="sp-input" placeholder="向知识库提问…" autocomplete="off" rows="1"></textarea>
      <button class="sp-chat-bar-send" id="sp-send">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/></svg>
      </button>
    </div>
  </div>
  <input type="file" id="sp-image-input" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none;">
  <!-- 合并下拉菜单 -->
  <div class="sp-kb-dropdown-menu" id="sp-kb-menu">
    <div class="sp-dropdown-item selected" data-kb="all">
      <span class="sp-radio"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      全部知识库
    </div>
    <div class="sp-dropdown-item" data-kb="quick-note">
      <span class="sp-radio"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      快速笔记
    </div>
    <div class="sp-dropdown-item" data-kb="web-collect">
      <span class="sp-radio"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      网页收藏
    </div>
    <div class="sp-dropdown-item" data-kb="product-doc">
      <span class="sp-radio"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      产品文档
    </div>
    <div class="sp-dropdown-item" data-kb="tech-spec">
      <span class="sp-radio"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      技术规范
    </div>
  </div>
  <!-- 模式下拉菜单（独立） -->
  <div class="sp-mode-dropdown-menu" id="sp-mode-menu">
    <div class="sp-mode-item selected" data-mode="fast">
      <span class="sp-radio"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      快速
    </div>
    <div class="sp-mode-item" data-mode="deep">
      <span class="sp-radio"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      深度
    </div>
    <div class="sp-mode-item" data-mode="precise">
      <span class="sp-radio"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      精确
    </div>
  </div>
</div>

<script src="sidepanel.js"></script>
</body>
</html>
